<section aria-hidden="true" class="tab-content section section--masbaha" id="masbaha" role="tabpanel">
<h2 class="sr-only">المسبحة الذكية</h2>

<div class="masbaha-layout">

  <!-- ① Current Zikr — clickable header opens selection sheet -->
  <div class="masbaha-zikr-header-wrap">
    <button class="masbaha-zikr-header no-select"
            id="masbahaZikrHeaderBtn"
            data-masbaha-action="open-zikr-sheet"
            type="button"
            aria-label="تغيير الذكر"
            aria-haspopup="dialog">
      <span class="amiri-text masbaha-zikr-name" id="masbahaCurrentEntryDisplay">سبحان الله</span>
      <i class="fa-solid fa-chevron-down masbaha-zikr-chevron" aria-hidden="true"></i>
    </button>
    <!-- Next zikr hint — hidden in custom mode via JS -->
    <p class="masbaha-next-hint" id="masbahaNextHint" aria-hidden="true">
      التالي: <span id="masbahaNextText">الحمد لله</span>
    </p>
  </div>

  <!-- ② Huge Tap Surface -->
  <button class="masbaha-tap-surface no-select"
          id="mashabaTapBtn"
          data-masbaha-action="increment"
          type="button"
          aria-label="اضغط للتسبيح">
    <span class="amiri-text masbaha-tap-count" id="totalCounter"
          aria-live="polite" aria-atomic="true">0</span>
    <span class="masbaha-tap-batch" id="batchCounter">0 / 33</span>
  </button>

  <!-- ③ Batch Progress (dots ≤50 | bar >50 — built by JS) -->
  <div class="masbaha-batch-progress" id="mashabaBatchProgress"
       role="progressbar"
       aria-label="تقدم الدورة الحالية"
       aria-valuemin="0" aria-valuenow="0" aria-valuemax="33">
  </div>

  <!-- ④ Daily Goal -->
  <div class="masbaha-daily-goal">
    <div class="masbaha-daily-goal__bar">
      <div class="masbaha-daily-goal__fill" id="mashabaDailyFill"></div>
    </div>
    <span class="masbaha-daily-goal__label" id="mashabaDailyLabel">٠ / ١٠٠ اليوم</span>
  </div>

  <!-- ⑤ Controls Row -->
  <div class="masbaha-controls no-select" aria-label="أدوات المسبحة">
    <div class="masbaha-streak" id="mashabaStreakDisplay">
      <i class="fa-solid fa-fire" aria-hidden="true"></i>
      <span id="mashabaStreakCount">0</span>
      <span class="masbaha-streak__unit">أيام متابعة</span>
    </div>
    <div class="masbaha-controls__actions">
      <button class="masbaha-ctrl-btn"
              id="mashabaSilentToggle"
              data-masbaha-action="toggle-silent"
              type="button"
              aria-label="تبديل الصوت"
              aria-pressed="false"
              title="الصوت">
        <i class="fa-solid fa-volume-high" id="silentIcon" aria-hidden="true"></i>
      </button>
      <button class="masbaha-ctrl-btn"
              data-masbaha-action="reset"
              type="button"
              aria-label="تصفير العداد"
              title="تصفير">
        <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
      </button>
      <button class="masbaha-ctrl-btn"
              data-masbaha-action="open-zikr-sheet"
              type="button"
              aria-label="اختر أو أضف ذكراً"
              title="أذكاري">
        <i class="fa-solid fa-pen" aria-hidden="true"></i>
      </button>
    </div>
  </div>

</div>
</section>
