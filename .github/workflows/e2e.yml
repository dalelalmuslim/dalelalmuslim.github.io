name: E2E Release Verification

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - e2e-pass27
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
         with: 
         node-version: 20
         cache: npm

      - name: Install dependencies
        run: npm install

      - name: Unit + integration tests
        shell: bash
        run: |
          set -euo pipefail
          node --test --experimental-loader ./tools/test/alias-loader.mjs $(find tests -name '*.test.ts' -print | sort)

      - name: Build
        run: npm run build

      - name: Browser runtime verification
        run: npm run verify:browser

      - name: Install Chromium
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Resolve Chrome binary
        id: chrome
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ steps.setup-chrome.outputs.chrome-path }}" ]; then
            echo "path=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for bin in google-chrome chrome chromium chromium-browser; do
            if command -v "$bin" >/dev/null 2>&1; then
              echo "path=$(command -v "$bin")" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "Could not find Chrome/Chromium binary"
          exit 1

      - name: Real browser E2E
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.path }}
        run: npm run verify:e2e

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          if-no-files-found: ignore
          path: |
            dist/**
            *.md
            *.log